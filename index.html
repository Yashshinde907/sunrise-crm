<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Realty CRM</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #FFB800; --slate: #0F172A; --white: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: #F1F5F9; color: var(--slate); }
        header { background: var(--slate); color: var(--gold); padding: 1rem; text-align: center; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card h2 { margin: 0; font-size: 2rem; color: var(--gold); }
        .input-area { padding: 15px; }
        textarea { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { width: 100%; background: var(--gold); color: var(--slate); border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        #log { padding: 15px; font-size: 0.8rem; }
        .log-entry { background: white; margin-bottom: 5px; padding: 10px; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>
    <header>SUNRISE REALTY CRM</header>
    
    <div class="stats-grid">
        <div class="card"><h2 id="call-count">0</h2><p>Calls</p></div>
        <div class="card"><h2 id="visit-count">0</h2><p>Visits</p></div>
    </div>

    <div class="input-area">
        <textarea id="rawInput" placeholder="Paste raw data here..."></textarea>
        <button onclick="processData()">PROCESS & SYNC</button>
    </div>

    <div id="log"><strong>Recent Activity:</strong></div>

    <script src="app.js"></script>
</body>
</html>
